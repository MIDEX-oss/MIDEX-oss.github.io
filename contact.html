<div class="content-card">
    <h2>Let's Work Together</h2>
    <p>Have an idea for an application or need database scaling help? Drop a message below.</p>
    
    <form id="contactForm" style="margin-top: 1.5rem;">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="contactName" placeholder="Alex" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="contactEmail" placeholder="alex@example.com" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea id="contactMessage" placeholder="Describe your project..." rows="4" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message</button>
    </form>
    <p id="formFeedback" style="margin-top: 1rem; font-weight: bold;"></p>
</div>
